<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#0B0D12"/>

  <text x="450" y="42" text-anchor="middle" font-family="Manrope, sans-serif" font-size="20" font-weight="700" fill="#E8EAED">From opaque footage to a queryable twin</text>

  <!-- LEFT: raw footage -->
  <g>
    <rect x="40" y="90" width="340" height="280" rx="12" fill="#14161C" stroke="#23262F" stroke-width="1"/>
    <text x="60" y="124" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="1.5" fill="#7C8493">RAW FOOTAGE</text>

    <rect x="60" y="144" width="300" height="170" rx="8" fill="#0B0D12" stroke="#23262F"/>
    <polygon points="195,200 195,260 250,230" fill="#3D4350"/>
    <text x="210" y="290" text-anchor="middle" font-family="Manrope, sans-serif" font-size="12" fill="#5C6372">10 minutes, no structure</text>

    <text x="60" y="340" font-family="Manrope, sans-serif" font-size="13" fill="#94A3B8">Linear video file.</text>
    <text x="60" y="360" font-family="Manrope, sans-serif" font-size="13" fill="#94A3B8">Nothing in it can be searched,</text>
    <text x="60" y="380" font-family="Manrope, sans-serif" font-size="13" fill="#94A3B8">scored, or queried.</text>
  </g>

  <!-- ARROW -->
  <path d="M395 230 L 495 230" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <text x="445" y="215" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#84CCFF">TWIN</text>
  <text x="445" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5C6372">GENERATOR</text>

  <!-- RIGHT: twin -->
  <g>
    <rect x="520" y="90" width="340" height="280" rx="12" fill="#14161C" stroke="#2A3A4A" stroke-width="1"/>
    <text x="540" y="124" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="1.5" fill="#84CCFF">DIGITAL TWIN</text>

    <!-- speakers block -->
    <rect x="540" y="144" width="142" height="58" rx="7" fill="#161A22" stroke="#23262F"/>
    <text x="552" y="164" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#C4B5FD">Speakers</text>
    <text x="552" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#7C8493">2 identified</text>

    <!-- topics block -->
    <rect x="694" y="144" width="146" height="58" rx="7" fill="#161A22" stroke="#23262F"/>
    <text x="706" y="164" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#84CCFF">Topics</text>
    <text x="706" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#7C8493">4 chapters</text>

    <!-- key moments block -->
    <rect x="540" y="212" width="300" height="80" rx="7" fill="#1B1620" stroke="rgba(196,181,253,0.25)"/>
    <text x="552" y="232" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#C4B5FD">Key Moments</text>
    <text x="552" y="250" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#9CA3AF">7 scored 1-10, e.g.:</text>
    <text x="552" y="266" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5EEAD4">9/10 "75% review time reduction"</text>
    <text x="552" y="282" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5EEAD4">10/10 "footage as a database" insight</text>

    <!-- fillers block -->
    <rect x="540" y="304" width="300" height="44" rx="7" fill="#161A22" stroke="#23262F"/>
    <text x="552" y="324" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Fillers</text>
    <text x="700" y="324" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5C6372">um · ah · pause - removable</text>
  </g>

  <text x="450" y="404" text-anchor="middle" font-family="Manrope, sans-serif" font-size="12" font-style="italic" fill="#5C6372">Same footage. Now it can be searched, scored, and edited by an agent.</text>
</svg>
